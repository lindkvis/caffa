name: Build with Unit Tests

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
jobs:
  caffa:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-22.04, ubuntu-24.04, macos-14 ]
        include:
          - os: windows-latest
            triplet: x64-windows
            vcpkgCommitId: 'c3867e714dd3a51c272826eea77267876517ed99'
          - os: ubuntu-22.04
            triplet: x64-linux
            vcpkgCommitId: 'eb0f108ebd674c6ed79acb1c2e123208c416af0d'
          - os: ubuntu-24.04
            triplet: x64-linux
            vcpkgCommitId: 'eb0f108ebd674c6ed79acb1c2e123208c416af0d'
          - os: macos-14
            triplet: arm64-osx
            vcpkgCommitId: 'eb0f108ebd674c6ed79acb1c2e123208c416af0d'
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
    steps:
      - name: Install dependencies
        run: sudo apt-get install ninja-build googletest libgtest-dev libssl-dev
        if: contains(matrix.os, 'ubuntu')
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
        if: contains(matrix.os, 'windows')
      - name: Install Ninja (Windows)
        if: contains(matrix.os, 'windows')
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: List $RUNNER_WORKSPACE before build
        run: find $RUNNER_WORKSPACE
        shell: bash
      - name: Setup VCPKG or load from cache
        uses: lukka/run-vcpkg@v11
        id: runvcpkg
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ matrix.vcpkgCommitId}}'
          runVcpkgInstall: false
          vcpkgJsonGlob: '*/vcpkg.json'
      - name: Prints output of run-vcpkg's action.
        run: echo "root='${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_ROOT_OUT }}', triplet='${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_DEFAULT_TRIPLET_OUT }}' "
      - name: Normalize X_VCPKG_RECURSIVE_DATA (Windows bash env workaround)
        if: contains(matrix.os, 'windows')
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os, json
          s = os.environ.get("X_VCPKG_RECURSIVE_DATA","").strip()
          if s:
            obj = json.loads(s)
            print("X_VCPKG_RECURSIVE_DATA=" + json.dumps(obj, separators=(",",":")))
          PY
      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ matrix.vcpkgCommitId }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Install vcpkg dependencies (retry on transient download failures)
        shell: bash
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          set -euo pipefail
          ok=0
          for i in 1 2 3 4 5; do
            echo "vcpkg install attempt $i..."
            if "${VCPKG_ROOT}/vcpkg" install --disable-metrics; then
              ok=1
              break
            fi
            echo "vcpkg install failed; sleeping before retry..."
            sleep $((i*15))
          done
          test "$ok" -eq 1
      - name: Configure Caffa
        uses: lukka/run-cmake@v10.7
        env:
          VCPKG_BINARY_SOURCES: "clear"
        with:
          configurePreset: 'ninja-multi-vcpkg'
      - name: Build Caffa
        uses: lukka/run-cmake@v10.7
        with:
          buildPreset: 'ninja-release-vcpkg'
      - name: Run Caffa Unit Tests
        uses: lukka/run-cmake@v10.7
        with:
          testPreset: 'test-release-vcpkg'
      - name: List $RUNNER_WORKSPACE after build
        run: find $RUNNER_WORKSPACE
        shell: bash
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python modules
        run: |
          python -m pip install --upgrade pip
          pip install setuptools pytest requests
      - name: Run pytest
        run: |
          builds/ninja-multi-vcpkg/bin/Release/caffaRestInterface_ExampleServer 50000 1 &
          cd RestInterface/Bindings/Python/caffa
          python -m pytest --log-cli-level=DEBUG
          cd ../../..
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: gradle
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Pick random port for Gradle
        run: echo "PORT=$((RANDOM % 50001 + 10000))" >> $GITHUB_ENV
        shell: bash
      - name: Build with Gradle
        run: |
          builds/ninja-multi-vcpkg/bin/Release/caffaRestInterface_ExampleServer ${{ env.PORT }} 1 &
          cd RestInterface/Bindings/Java
          gradle wrapper
          ./gradlew build test -Dport=${{ env.PORT }}
        env:
          PORT: ${{ env.PORT }}
      - name: Upload Gradle problems report
        uses: actions/upload-artifact@v4
        with:
          name: gradle-problems-report-${{ matrix.os }}
          path: RestInterface/Bindings/Java/build/reports/problems/problems-report.html

