name: Build with Unit Tests

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
jobs:
  caffa:
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtest-dev libssl-dev \
            libboost-dev libboost-regex-dev libboost-json-dev libboost-system-dev libboost-program-options-dev
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
      - name: Configure Caffa
        uses: lukka/run-cmake@v10.7
        with:
          configurePreset: 'ninja-multi'
      - name: Build Caffa
        uses: lukka/run-cmake@v10.7
        with:
          buildPreset: 'ninja-release'
      - name: Run Caffa Unit Tests
        uses: lukka/run-cmake@v10.7
        with:
          testPreset: 'test-release'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python modules
        run: |
          python -m pip install --upgrade pip
          pip install setuptools pytest requests
      - name: Run pytest
        run: |
          builds/ninja-multi/bin/Release/caffaRestInterface_ExampleServer 50000 1 &
          cd RestInterface/Bindings/Python/caffa
          python -m pytest --log-cli-level=DEBUG
          cd ../../..
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: gradle
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3
      - name: Pick random port for Gradle
        run: echo "PORT=$((RANDOM % 50001 + 10000))" >> $GITHUB_ENV
      - name: Build with Gradle
        run: |
          builds/ninja-multi/bin/Release/caffaRestInterface_ExampleServer ${{ env.PORT }} 1 &
          cd RestInterface/Bindings/Java
          gradle wrapper
          ./gradlew build test -Dport=${{ env.PORT }}
        env:
          PORT: ${{ env.PORT }}
      - name: Upload Gradle problems report
        uses: actions/upload-artifact@v4
        with:
          name: gradle-problems-report
          path: RestInterface/Bindings/Java/build/reports/problems/problems-report.html
